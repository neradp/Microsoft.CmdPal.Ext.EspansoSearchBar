name: Build EspansoSearchBar

# Builds the Command Palette extension entirely in the cloud, on GitHub's Windows runners.
# GitHub's "windows-latest" runners already come with Visual Studio Build Tools, the .NET
# SDK and the Windows 11 SDK preinstalled - see the runner image manifest:
# https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
# so no local Visual Studio installation is required on your own machine to get a build.
#
# This does NOT deploy/install the MSIX on your machine - it only proves the code builds and
# produces the package artifacts, which you can download from the workflow run and install on
# a Windows 11 machine with Developer Mode enabled (Add-AppxPackage), or open in Visual Studio
# to Deploy/debug interactively.

on:
  push:
    branches: [ "main" ]
    # Pushing a tag like v1.2.0 builds the package with that version and publishes
    # a GitHub Release with the signed .msix and the public .cer attached.
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write # needed to create GitHub Releases on tag pushes

jobs:
  build:
    runs-on: windows-latest

    # x64 only - ARM64 was dropped to keep the matrix/build minimal per current requirements.
    env:
      PLATFORM: x64

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          # Preview SDKs (the project uses a preview Windows SDK package version) need this.
          dotnet-quality: "preview"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      # Stamp a unique, monotonically increasing package version into the manifest.
      # Windows refuses to reinstall an MSIX with the same version that is already
      # installed, so without this every artifact from CI would collide with the
      # previously installed build.
      # - Tag builds (refs/tags/vX.Y.Z) use X.Y.Z.0 from the tag name.
      # - All other builds use 0.0.<run_number>.0 (github.run_number increments per
      #   workflow run; the revision digit stays 0 - it is reserved by MSIX versioning).
      - name: Stamp package version
        id: version
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $version = "${{ github.ref_name }}".TrimStart("v") + ".0"
          } else {
            $version = "0.0.${{ github.run_number }}.0"
          }
          $manifest = "EspansoSearchBar\Package.appxmanifest"
          $xml = [xml](Get-Content $manifest -Raw)
          $xml.Package.Identity.Version = $version
          $xml.Save((Resolve-Path $manifest))
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Stamped package version $version"

      - name: Restore NuGet packages
        run: msbuild EspansoSearchBar.sln /t:Restore /p:Configuration=Release /p:Platform=${{ env.PLATFORM }}

      # MSIX packages containing executable activations (like this COM-server extension)
      # cannot be installed unsigned (error 0x80073D2B), so CI signs the package with a
      # throwaway self-signed certificate whose Subject matches the manifest Publisher
      # (CN=EspansoSearchBar). The public .cer is published next to the .msix - import it
      # into "Trusted People" (LocalMachine) once, then the package installs normally.
      - name: Create self-signed signing certificate
        id: cert
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=EspansoSearchBar" `
            -KeyUsage DigitalSignature `
            -FriendlyName "EspansoSearchBar CI signing (self-signed)" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          "thumbprint=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Created signing certificate $($cert.Thumbprint)"

      - name: Build
        run: msbuild EspansoSearchBar.sln /m /p:Configuration=Release /p:Platform=${{ env.PLATFORM }} /p:GenerateAppxPackageOnBuild=true /p:AppxPackageDir=AppxPackages\ /p:AppxPackageSigningEnabled=true /p:PackageCertificateThumbprint=${{ steps.cert.outputs.thumbprint }}

      - name: Export public certificate next to the package
        run: |
          Export-Certificate `
            -Cert "Cert:\CurrentUser\My\${{ steps.cert.outputs.thumbprint }}" `
            -FilePath "EspansoSearchBar\AppxPackages\EspansoSearchBar.cer"
          Write-Host "Exported EspansoSearchBar.cer"

      # Diagnostic step so the run log always shows exactly where the .msix ended up.
      - name: List produced packages
        run: Get-ChildItem -Recurse -Include *.msix,*.msixbundle,*.appx,*.cer | Select-Object -ExpandProperty FullName

      - name: Upload MSIX package
        uses: actions/upload-artifact@v7
        with:
          name: EspansoSearchBar-msix-${{ env.PLATFORM }}
          # AppxPackageDir is relative to the project directory, so the package lands under
          # EspansoSearchBar/AppxPackages/, not under bin/.
          path: |
            EspansoSearchBar/AppxPackages/**
          if-no-files-found: error

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: EspansoSearchBar-${{ env.PLATFORM }}
          path: |
            EspansoSearchBar/bin/${{ env.PLATFORM }}/Release/**
          if-no-files-found: warn

      # On tag pushes (v*), publish a GitHub Release with the signed .msix and the
      # public .cer attached, plus installation instructions in the release notes.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: EspansoSearchBar ${{ github.ref_name }}
          files: |
            EspansoSearchBar/AppxPackages/**/*.msix
            EspansoSearchBar/AppxPackages/EspansoSearchBar.cer
          body: |
            ## Installation

            Prerequisites: Windows 11 with [PowerToys](https://aka.ms/installpowertoys) (Command Palette) and [espanso](https://espanso.org) installed.

            1. Download the `.msix` package and `EspansoSearchBar.cer` from the assets below.
            2. Trust the signing certificate — one-time step per certificate, requires an **elevated (admin) PowerShell**:

               ```powershell
               Import-Certificate -FilePath .\EspansoSearchBar.cer -CertStoreLocation Cert:\LocalMachine\TrustedPeople
               ```

            3. Install the package (regular, non-elevated PowerShell is fine):

               ```powershell
               Add-AppxPackage -Path .\EspansoSearchBar_${{ steps.version.outputs.version }}_x64.msix
               ```

               To reinstall the *same* version over itself, add
               `-ForceUpdateFromAnyVersion -ForceApplicationShutdown`.

            4. Open Command Palette (default `Win+Alt+Space`). If the extension does not appear,
               run **Reload Command Palette extensions** inside the palette.

            > **Note:** the package is signed with a CI-generated self-signed certificate, and each
            > release generates a *new* one — re-import the `.cer` from this release before installing.
