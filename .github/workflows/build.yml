name: Build EspansoSearchBar

# Builds the Command Palette extension entirely in the cloud, on GitHub's Windows runners.
# GitHub's "windows-latest" runners already come with Visual Studio Build Tools, the .NET
# SDK and the Windows 11 SDK preinstalled - see the runner image manifest:
# https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
# so no local Visual Studio installation is required on your own machine to get a build.
#
# This does NOT deploy/install the MSIX on your machine - it only proves the code builds and
# produces the package artifacts, which you can download from the workflow run and install on
# a Windows 11 machine with Developer Mode enabled (Add-AppxPackage), or open in Visual Studio
# to Deploy/debug interactively.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    # x64 only - ARM64 was dropped to keep the matrix/build minimal per current requirements.
    env:
      PLATFORM: x64

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          # Preview SDKs (the project uses a preview Windows SDK package version) need this.
          dotnet-quality: "preview"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet packages
        run: msbuild EspansoSearchBar.sln /t:Restore /p:Configuration=Release /p:Platform=${{ env.PLATFORM }}

      # MSIX packages containing executable activations (like this COM-server extension)
      # cannot be installed unsigned (error 0x80073D2B), so CI signs the package with a
      # throwaway self-signed certificate whose Subject matches the manifest Publisher
      # (CN=EspansoSearchBar). The public .cer is published next to the .msix - import it
      # into "Trusted People" (LocalMachine) once, then the package installs normally.
      - name: Create self-signed signing certificate
        id: cert
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=EspansoSearchBar" `
            -KeyUsage DigitalSignature `
            -FriendlyName "EspansoSearchBar CI signing (self-signed)" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          "thumbprint=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Created signing certificate $($cert.Thumbprint)"

      - name: Build
        run: msbuild EspansoSearchBar.sln /m /p:Configuration=Release /p:Platform=${{ env.PLATFORM }} /p:GenerateAppxPackageOnBuild=true /p:AppxPackageDir=AppxPackages\ /p:AppxPackageSigningEnabled=true /p:PackageCertificateThumbprint=${{ steps.cert.outputs.thumbprint }}

      - name: Export public certificate next to the package
        run: |
          Export-Certificate `
            -Cert "Cert:\CurrentUser\My\${{ steps.cert.outputs.thumbprint }}" `
            -FilePath "EspansoSearchBar\AppxPackages\EspansoSearchBar.cer"
          Write-Host "Exported EspansoSearchBar.cer"

      # Diagnostic step so the run log always shows exactly where the .msix ended up.
      - name: List produced packages
        run: Get-ChildItem -Recurse -Include *.msix,*.msixbundle,*.appx,*.cer | Select-Object -ExpandProperty FullName

      - name: Upload MSIX package
        uses: actions/upload-artifact@v7
        with:
          name: EspansoSearchBar-msix-${{ env.PLATFORM }}
          # AppxPackageDir is relative to the project directory, so the package lands under
          # EspansoSearchBar/AppxPackages/, not under bin/.
          path: |
            EspansoSearchBar/AppxPackages/**
          if-no-files-found: error

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: EspansoSearchBar-${{ env.PLATFORM }}
          path: |
            EspansoSearchBar/bin/${{ env.PLATFORM }}/Release/**
          if-no-files-found: warn
